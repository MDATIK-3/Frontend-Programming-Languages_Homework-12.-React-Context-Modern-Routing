<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Form Styled Inputs</title>

        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>

        <form id="input-form">
            <div class="form-group">
                <label for="small-primary">Small Primary Input</label>

                <input
                    type="text"
                    id="small-primary"
                    class="input input-primary input-small"
                    placeholder="Enter small text" />
            </div>

            <div class="form-group">
                <label for="medium-secondary">Medium Secondary Input</label>

                <input
                    type="text"
                    id="medium-secondary"
                    class="input input-secondary input-medium"
                    placeholder="Enter medium text" />
            </div>

            <div class="form-group">
                <label for="large-primary">Large Primary Input</label>

                <input
                    type="text"
                    id="large-primary"
                    class="input input-primary input-large"
                    placeholder="Enter large text" />
            </div>
        </form>
    </body>
</html>
